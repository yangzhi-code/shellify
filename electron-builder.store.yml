appId: me.yangzhi.shellify
productName: shellify

directories:
  buildResources: build
  output: dist-store

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{.github/**}'

asarUnpack:
  - resources/**
  - node_modules/better-sqlite3/**/*
  - node_modules/better-sqlite3/build/Release/*.node
  - node_modules/ssh2/**/*
  - node_modules/cpu-features/**/*

mac:
  category: public.app-category.utilities
  # 交给自动发现，MAS 构建会匹配 3rd Party Mac Developer Application
  notarize: false
  hardenedRuntime: false       # 上架 MAS 必须关
  gatekeeperAssess: false      # 上架 MAS 必须关
  extendInfo:
    ElectronTeamID: "6KQ684K3H7"

# 上架 MAS 核心配置
mas:
  # 交给自动发现，会自动匹配 3rd Party Mac Developer Application
  entitlements: build/entitlements.mas.plist
  entitlementsInherit: build/entitlements.mas.inherit.plist
  timestamp: false
  hardenedRuntime: false

pkg:
  artifactName: ${name}-${version}.${ext}
  # App Store 安装包必须使用 3rd Party Mac Developer Installer 证书！
  identity: "5AA46EF07204AD7552FFD2EE2644ECC79F8800DA"

npmRebuild: false